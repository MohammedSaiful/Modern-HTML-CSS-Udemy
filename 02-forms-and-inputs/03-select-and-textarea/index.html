<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML & CSS Sandbox</title>
</head>

<body>
  <h1>HTML & CSS Sandbox - Select & Textarea</h1>

  <form>
    <label for="product">Product</label>
    <br />
    <select name="product" id="product" multiple size="3">
      <option value="iphone">iphone</option>
      <option value="imac">Imac</option>
      <option value="macbook" selected>Macbook</option>
      <option value="macbook Pro">Macbook Pro</option>
      <option value="macbook dash pro">Macbook dash pro</option>
    </select>

    <br />
    <br />

    <label for="message">Message</label>
    <br />
    <textarea name="message" id="message" placeholder="Enter your issue" rows="4" cols="40"></textarea>
    <br />
    <input type="submit" value="Submit">
  </form>
</body>

</html>
